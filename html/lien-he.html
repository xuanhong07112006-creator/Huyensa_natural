<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Huyền Sa Naturals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        body { 
            background-color: #FDFBF7; 
            font-family: 'Montserrat', sans-serif !important; /* Dùng !important để ghi đè mọi thứ */
        }
    </style>
</head>

<body class="p-8">
    <!-- Di chuyển nút Quay về vào đây -->
    <a href="chính.HTML" class="inline-flex items-center text-gray-500 hover:text-[#58161A] transition mb-4 font-medium">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
        Quay về trang chủ
    </a>

    <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-12 mt-10">
        <!-- Bên trái: Thông tin -->
        <div class="w-full md:w-1/2">
            <h1 class="text-5xl font-semibold text-[#58161A] mb-6">Kết nối<br>với chúng tôi</h1>
            <p class="text-gray-600 mb-8">Chúng tôi luôn sẵn sàng lắng nghe và hỗ trợ bạn. Hãy để lại thông tin và chúng tôi sẽ liên hệ trong thời gian sớm nhất.</p>
            <div class="space-y-6">
                <div class="flex items-center gap-4">
                    <div class="bg-red-100 p-3 rounded-full text-[#A64B58]">📞</div>
                    <div><p class="text-sm text-gray-500">Điện thoại</p><p class="font-medium">0369 153 859</p></div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-red-100 p-3 rounded-full text-[#A64B58]">✉️</div>
                    <div><p class="text-sm text-gray-500">Email</p><p class="font-medium">huyensanaturals@gmail.com</p></div>
                </div>
            </div>
        </div>

        <!-- Bên phải: Form -->
        <form class="w-full md:w-1/2 space-y-4">
            <div><label class="block text-sm mb-1">Họ và tên</label><input type="text" class="w-full p-3 rounded-lg bg-white border border-gray-200" placeholder="Nhập họ và tên"></div>
            <div><label class="block text-sm mb-1">Email</label><input type="email" class="w-full p-3 rounded-lg bg-white border border-gray-200" placeholder="Nhập email"></div>
            <div><label class="block text-sm mb-1">Tin nhắn</label><textarea class="w-full p-3 rounded-lg bg-white border border-gray-200 h-32" placeholder="Nhập tin nhắn của bạn"></textarea></div>
            <button class="w-full bg-[#A64B58] text-white py-3 rounded-full font-bold">GỬI TIN NHẮN</button>
        </form>
    </div>
</body>
</html>
